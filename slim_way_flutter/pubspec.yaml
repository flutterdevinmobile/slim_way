name: slim_way_flutter
description: A new Flutter project with Serverpod.

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '^3.8.0'
  flutter: '^3.32.0'

dependencies:
  cupertino_icons: ^1.0.5
  flutter:
    sdk: flutter
  slim_way_client:
    path: ../slim_way_client
  serverpod_flutter: 3.2.3
  serverpod_auth_shared_flutter: 3.2.3
  serverpod_auth_email_flutter: 3.2.3
  google_sign_in: ^7.1.0
  mobile_scanner: ^5.2.2
  http: ^1.2.1
  
  # UI & Utils
  provider: ^6.1.1
  fl_chart: ^0.66.0
  image_picker: ^1.1.2
  intl: ^0.20.0
  google_fonts: ^6.2.0
  uuid: ^4.3.3
  flutter_svg: ^2.0.17
  pedometer: ^4.1.1
  percent_indicator: ^4.2.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^12.0.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_lints: '>=3.0.0 <7.0.0'
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/config.json
dependency_overrides:
  flutter_secure_storage: ^10.0.0
