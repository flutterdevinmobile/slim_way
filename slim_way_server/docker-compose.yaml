services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: slim_way
      POSTGRES_PASSWORD: "B9fRXkoVmfRbeFSWR3M1YZeiNbEOMcMN"
    volumes:
      - slim_way_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "6378:6379"
    command: redis-server --requirepass "9RIg9toYziYEzKefTrjqZe7m-5_aOeu_"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "8433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: slim_way_test
      POSTGRES_PASSWORD: "zEzb7uqELH3W2JOxwOpaUh7Pi5j6zGII"
    volumes:
      - slim_way_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "6377:6379"
    command: redis-server --requirepass "41cm6cpUyVjaV3kUXhnYM5p23T55HkJv"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  slim_way_data:
  slim_way_test_data:
